<!DOCTYPE html>
<html lang="en" class="theme-summer-raspberry">
<head>
  <meta charset="UTF-8" >
  <meta name="viewport" content="width=device-width, initial-scale=1.0" >
  <title>Forgot Password | ArcList</title>
  <link rel="stylesheet" href="../css/main.css" >
  <script type="module">
  import { getUser } from "../js/utils/session.js";
  import { applyTheme } from "../js/utils/theme.js";

  const user = getUser();
  applyTheme(user?.theme || "summer-raspberry");
</script>
</head>
<body class="theme-summer-raspberry">
  <main class="auth-shell">
    <section class="auth-card glass-card">
      <a href="./index.html" class="brand">
        <span class="brand-name">ArcList</span>
        <span class="powered-by">powered by archives</span>
      </a>

      <h1>Reset password</h1>
      <p>Enter your email and we’ll send you a reset link when the backend flow is connected.</p>

      <form class="auth-form" id="forgotPasswordForm">
        <div class="form-group">
          <label class="form-label" for="resetEmail">Email</label>
          <input class="form-input" type="email" id="resetEmail" name="email" placeholder="you@example.com" required />
        </div>

        <button type="submit" class="btn btn-primary">Send Reset Link</button>
      </form>

      <p class="auth-footer">
        Remembered it?
        <a href="./login.html" class="form-link">Back to login</a>
      </p>
    </section>
  </main>
</body>
</html>
